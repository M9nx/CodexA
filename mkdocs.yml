site_name: CodexA Documentation
site_description: Developer intelligence CLI — semantic code search, AI-assisted understanding, and workspace tooling
site_url: https://m9nx.github.io/CodexA/
repo_url: https://github.com/M9nx/CodexA
repo_name: M9nx/CodexA
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
  - Architecture: architecture.md
  - Reference:
      - CLI Commands: CLI.md
      - Modules: modules.md
      - AI Tool Protocol: AI_TOOL_PROTOCOL.md
      - Bridge Protocol: BRIDGE.md
      - Tools Registry: TOOLS.md
      - Web Interface: WEB.md
  - Guides:
      - Plugin System: PLUGINS.md
      - AI Workflows: AI_WORKFLOWS.md
      - CI/CD Integration: CI.md
      - Quality Metrics: QUALITY_METRICS.md
      - Workflow Intelligence: WORKFLOW_INTELLIGENCE.md
  - API Reference: api.md
  - Comparison: CodexA-vs-ck.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/M9nx/CodexA
